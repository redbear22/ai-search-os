<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AI Search Rank — Brand Intro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{
  background:#000;display:flex;align-items:center;
  justify-content:center;min-height:100vh;overflow:hidden;
}
.scene{
  position:relative;
  width:min(100vw,calc(100vh * 16 / 9));
  aspect-ratio:16/9;
  background:#07090F;overflow:hidden;
  font-family:'Space Grotesk',sans-serif;cursor:default;user-select:none;
}
canvas{position:absolute;inset:0;width:100%;height:100%;z-index:1}

/* Grid */
.grid{
  position:absolute;inset:0;z-index:2;
  background-image:
    linear-gradient(rgba(59,130,246,.055) 1px,transparent 1px),
    linear-gradient(90deg,rgba(59,130,246,.055) 1px,transparent 1px);
  background-size:5.5% 5.5%;
  opacity:0;pointer-events:none;
  transition:opacity 1.6s ease;
}
.grid.on{opacity:1}

/* Vignette */
.vig{
  position:absolute;inset:0;z-index:3;
  background:radial-gradient(ellipse 72% 72% at 50% 50%,transparent 18%,#07090F 100%);
  pointer-events:none;
}

/* SVG lines */
svg.lines{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:4}

/* Platform nodes */
.node{
  position:absolute;transform:translate(-50%,-50%) scale(0);
  opacity:0;display:flex;flex-direction:column;align-items:center;gap:8px;
  pointer-events:none;z-index:5;
}
.node.in{animation:nodeIn .75s cubic-bezier(.34,1.56,.64,1) forwards}
.node.out{animation:nodeOut .85s ease forwards}
@keyframes nodeIn{
  from{opacity:0;transform:translate(-50%,-50%) scale(.25)}
  to{opacity:1;transform:translate(-50%,-50%) scale(1)}
}
@keyframes nodeOut{
  from{opacity:1;transform:translate(-50%,-50%) scale(1)}
  to{opacity:0;transform:translate(-50%,-50%) scale(.55)}
}
.ring{
  width:clamp(50px,6.8vw,86px);height:clamp(50px,6.8vw,86px);
  border-radius:50%;border:1.5px solid currentColor;
  display:flex;align-items:center;justify-content:center;position:relative;
  animation:ringBreath 2.8s ease-in-out infinite;
}
.ring::before{
  content:'';position:absolute;inset:-9px;border-radius:50%;
  border:1px solid currentColor;opacity:.2;
  animation:ringBreath 2.8s ease-in-out infinite .6s;
}
.ring::after{
  content:'';position:absolute;inset:-20px;border-radius:50%;
  border:1px solid currentColor;opacity:.08;
  animation:ringBreath 2.8s ease-in-out infinite 1s;
}
@keyframes ringBreath{0%,100%{opacity:.6}50%{opacity:1}}
.ring-lbl{
  font-size:clamp(16px,2.2vw,28px);font-weight:700;
  font-family:'Space Grotesk',sans-serif;line-height:1;
}
.nname{
  font-family:'JetBrains Mono',monospace;
  font-size:clamp(7px,.88vw,11px);letter-spacing:.2em;
  color:rgba(255,255,255,.42);white-space:nowrap;
}
.cstatus{
  font-family:'JetBrains Mono',monospace;
  font-size:clamp(6px,.78vw,9px);letter-spacing:.15em;
  color:#22C55E;opacity:0;white-space:nowrap;
}
.cstatus.on{animation:statusPop .35s ease forwards}
@keyframes statusPop{
  from{opacity:0;transform:translateY(5px)}
  to{opacity:1;transform:translateY(0)}
}
.node.cited .ring{animation:ringCited .65s cubic-bezier(.34,1.56,.64,1) forwards}
@keyframes ringCited{
  0%{transform:scale(1)}
  50%{transform:scale(1.35);filter:brightness(2.5)}
  100%{transform:scale(1.12);filter:brightness(1.6)}
}

/* Scan ring */
.scan{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%) scale(0);
  width:52px;height:52px;border-radius:50%;
  border:2px solid #22D3EE;
  box-shadow:0 0 28px #22D3EE,inset 0 0 14px rgba(34,211,238,.3);
  opacity:0;pointer-events:none;z-index:6;
}
.scan.fire{animation:scanFire 3s cubic-bezier(.22,.61,.36,1) forwards}
@keyframes scanFire{
  0%{transform:translate(-50%,-50%) scale(0);opacity:0}
  3%{opacity:1}
  100%{transform:translate(-50%,-50%) scale(15);opacity:0}
}

/* Center glow */
.cglow{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:46%;height:62%;
  background:radial-gradient(ellipse,rgba(99,102,241,.22) 0%,transparent 70%);
  filter:blur(45px);opacity:0;pointer-events:none;z-index:3;
  transition:opacity 2s ease;
}
.cglow.on{opacity:1}

/* Question */
.question{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  font-size:clamp(12px,1.9vw,26px);font-weight:300;letter-spacing:.04em;
  color:rgba(226,232,240,.68);text-align:center;white-space:nowrap;
  opacity:0;z-index:7;pointer-events:none;
  transition:opacity .95s ease;
}
.question.on{opacity:1}

/* Logo */
.logo{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  text-align:center;z-index:8;pointer-events:none;
}
.lpre{
  font-family:'JetBrains Mono',monospace;
  font-size:clamp(7px,.95vw,12px);letter-spacing:.42em;color:#22D3EE;
  opacity:0;transform:translateY(16px);
  transition:opacity .85s ease,transform .85s ease;margin-bottom:14px;
}
.lpre.on{opacity:1;transform:translateY(0)}
.lmark{
  font-family:'Space Grotesk',sans-serif;
  font-size:clamp(24px,5.8vw,72px);font-weight:700;letter-spacing:.065em;
  background:linear-gradient(130deg,#60A5FA 0%,#A78BFA 55%,#F0ABFC 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  opacity:0;filter:blur(20px);transform:scale(.86);
  transition:opacity 1.4s ease,filter 1.4s ease,transform 1.4s ease;
  white-space:nowrap;line-height:1.05;
}
.lmark.on{opacity:1;filter:blur(0);transform:scale(1)}
.lbadge{
  display:inline-block;margin-top:12px;
  padding:5px 18px;
  border:1px solid rgba(99,102,241,.35);border-radius:40px;
  font-family:'JetBrains Mono',monospace;
  font-size:clamp(6px,.78vw,9.5px);letter-spacing:.22em;
  color:rgba(165,180,252,.65);
  opacity:0;transition:opacity .8s .35s ease;
}
.lbadge.on{opacity:1}
.lurl{
  font-family:'JetBrains Mono',monospace;
  font-size:clamp(8px,.92vw,12px);letter-spacing:.07em;
  color:rgba(96,165,250,.58);
  opacity:0;transition:opacity .8s .55s ease;margin-top:28px;display:block;
}
.lurl.on{opacity:1}

/* Replay */
.replay{
  position:absolute;bottom:5.5%;left:50%;transform:translateX(-50%);
  font-family:'JetBrains Mono',monospace;
  font-size:clamp(7px,.88vw,10.5px);letter-spacing:.26em;
  color:rgba(148,163,184,.38);border:1px solid rgba(148,163,184,.16);
  padding:7px 22px;border-radius:3px;cursor:pointer;opacity:0;
  transition:opacity .55s ease,color .2s,border-color .2s;
  z-index:20;pointer-events:none;
}
.replay.on{opacity:1;pointer-events:all}
.replay:hover{color:#60A5FA;border-color:rgba(96,165,250,.42)}

/* Progress */
.pbar{position:absolute;bottom:0;left:0;right:0;height:2px;background:rgba(255,255,255,.04);z-index:20}
.pfill{height:100%;background:linear-gradient(90deg,#3B82F6,#8B5CF6);width:0%;transition:width .08s linear}

/* Subtle horizontal scan line */
.scanline{
  position:absolute;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(34,211,238,.18),transparent);
  top:-2px;z-index:9;pointer-events:none;opacity:0;
  animation:scanlineMove 8s linear infinite;
}
.scanline.on{opacity:1}
@keyframes scanlineMove{0%{top:-2px}100%{top:102%}}
</style>
</head>
<body>
<div class="scene" id="scene">
  <canvas id="cvs"></canvas>
  <div class="grid" id="grid"></div>
  <div class="vig"></div>
  <div class="scanline" id="scanline"></div>

  <svg class="lines" id="svgl" xmlns="http://www.w3.org/2000/svg"></svg>

  <!-- Platform nodes: top=GPT  right=PPX  bottom=CLD  left=GEM -->
  <div class="node" id="nGPT" style="top:20%;left:50%">
    <div class="ring" style="color:#06B6D4;box-shadow:0 0 22px rgba(6,182,212,.4)">
      <span class="ring-lbl" style="color:#06B6D4">G</span>
    </div>
    <div class="nname">CHATGPT</div>
    <div class="cstatus" id="csGPT">● CITING</div>
  </div>
  <div class="node" id="nPPX" style="top:50%;left:80%">
    <div class="ring" style="color:#A855F7;box-shadow:0 0 22px rgba(168,85,247,.4)">
      <span class="ring-lbl" style="color:#A855F7">P</span>
    </div>
    <div class="nname">PERPLEXITY</div>
    <div class="cstatus" id="csPPX">● CITING</div>
  </div>
  <div class="node" id="nCLD" style="top:80%;left:50%">
    <div class="ring" style="color:#FB923C;box-shadow:0 0 22px rgba(251,146,60,.4)">
      <span class="ring-lbl" style="color:#FB923C">C</span>
    </div>
    <div class="nname">CLAUDE</div>
    <div class="cstatus" id="csCLD">● CITING</div>
  </div>
  <div class="node" id="nGEM" style="top:50%;left:20%">
    <div class="ring" style="color:#60A5FA;box-shadow:0 0 22px rgba(96,165,250,.4)">
      <span class="ring-lbl" style="color:#60A5FA">◈</span>
    </div>
    <div class="nname">GEMINI</div>
    <div class="cstatus" id="csGEM">● CITING</div>
  </div>

  <div class="scan" id="scan"></div>
  <div class="cglow" id="cglow"></div>
  <div class="question" id="qtext">Where does AI mention your brand?</div>

  <div class="logo">
    <div class="lpre" id="lpre">AI SEARCH OS</div>
    <div class="lmark" id="lmark">AI SEARCH RANK</div>
    <div class="lbadge" id="lbadge">THE AI SEARCH OPERATING SYSTEM</div>
    <span class="lurl" id="lurl">aisearchrank.ai</span>
  </div>

  <div class="replay" id="replay">↺ REPLAY</div>
  <div class="pbar"><div class="pfill" id="pfill"></div></div>
</div>

<script>
const scene=document.getElementById('scene');
const cvs=document.getElementById('cvs');
const ctx=cvs.getContext('2d');
let W,H;

function resize(){W=cvs.width=scene.offsetWidth;H=cvs.height=scene.offsetHeight}
resize();window.addEventListener('resize',resize);

const pts=Array.from({length:76},()=>({
  x:Math.random()*1920,y:Math.random()*1080,
  vx:(Math.random()-.5)*.2,vy:(Math.random()-.5)*.2,
  r:Math.random()*1.1+.35,a:Math.random()*.36+.1
}));

function frame(){
  ctx.clearRect(0,0,W,H);
  const sx=W/1920,sy=H/1080;
  for(const p of pts){
    p.x+=p.vx;p.y+=p.vy;
    if(p.x<0||p.x>1920)p.vx*=-1;
    if(p.y<0||p.y>1080)p.vy*=-1;
  }
  for(let i=0;i<pts.length;i++){
    for(let j=i+1;j<pts.length;j++){
      const dx=(pts[i].x-pts[j].x)*sx,dy=(pts[i].y-pts[j].y)*sy;
      const d=Math.sqrt(dx*dx+dy*dy);
      if(d<110){
        ctx.beginPath();
        ctx.moveTo(pts[i].x*sx,pts[i].y*sy);
        ctx.lineTo(pts[j].x*sx,pts[j].y*sy);
        ctx.strokeStyle=`rgba(59,130,246,${(1-d/110)*.1})`;
        ctx.lineWidth=.4;ctx.stroke();
      }
    }
    ctx.beginPath();
    ctx.arc(pts[i].x*sx,pts[i].y*sy,pts[i].r,0,Math.PI*2);
    ctx.fillStyle=`rgba(100,140,230,${pts[i].a})`;ctx.fill();
  }
  requestAnimationFrame(frame);
}
frame();

const $=id=>document.getElementById(id);
let tos=[];
const after=(fn,t)=>{tos.push(setTimeout(fn,t))};
const add=(id,cls)=>{$(id)&&$(id).classList.add(cls)};
const rem=(id,cls)=>{$(id)&&$(id).classList.remove(cls)};

function makeLine(x1p,y1p,x2p,y2p,color){
  const svg=$('svgl');
  const x1=W*x1p,y1=H*y1p,x2=W*x2p,y2=H*y2p;
  const len=Math.hypot(x2-x1,y2-y1);
  const l=document.createElementNS('http://www.w3.org/2000/svg','line');
  l.setAttribute('x1',x1);l.setAttribute('y1',y1);
  l.setAttribute('x2',x2);l.setAttribute('y2',y2);
  l.setAttribute('stroke',color);l.setAttribute('stroke-width','1.5');
  l.setAttribute('stroke-dasharray',len);l.setAttribute('stroke-dashoffset',len);
  svg.appendChild(l);
  requestAnimationFrame(()=>{
    l.style.transition='stroke-dashoffset 1s ease';
    setTimeout(()=>l.setAttribute('stroke-dashoffset','0'),20);
  });
}

function makeGlowDot(xp,yp,color){
  const svg=$('svgl');
  const cx=W*xp,cy=H*yp,r=W*.012;
  const c=document.createElementNS('http://www.w3.org/2000/svg','circle');
  c.setAttribute('cx',cx);c.setAttribute('cy',cy);c.setAttribute('r',r);
  c.setAttribute('fill',color);c.setAttribute('opacity','0');
  svg.appendChild(c);
  requestAnimationFrame(()=>{
    c.style.transition='opacity .4s ease';
    setTimeout(()=>c.setAttribute('opacity','1'),20);
  });
  return c;
}

const TOTAL=14500;
let t0;

function play(){
  t0=Date.now();

  after(()=>{add('grid','on');add('scanline','on')},950);

  after(()=>add('nGPT','in'),1700);
  after(()=>add('nGEM','in'),2050);
  after(()=>add('nPPX','in'),2400);
  after(()=>add('nCLD','in'),2750);

  after(()=>add('qtext','on'),3900);

  // Scan fires
  after(()=>{
    const sr=$('scan');sr.classList.remove('fire');
    void sr.offsetWidth;sr.classList.add('fire');
  },5300);

  // Nodes cited with lines
  const cites=[
    {node:'nGPT',cs:'csGPT',sx:.50,sy:.20,color:'rgba(6,182,212,.8)'},
    {node:'nGEM',cs:'csGEM',sx:.20,sy:.50,color:'rgba(96,165,250,.8)'},
    {node:'nPPX',cs:'csPPX',sx:.80,sy:.50,color:'rgba(168,85,247,.8)'},
    {node:'nCLD',cs:'csCLD',sx:.50,sy:.80,color:'rgba(251,146,60,.8)'},
  ];
  cites.forEach(({node,cs,sx,sy,color},i)=>{
    after(()=>{
      add(node,'cited');add(cs,'on');
      makeGlowDot(sx,sy,color);
      makeLine(sx,sy,.50,.50,color);
    },5900+i*400);
  });

  // Central convergence dot
  after(()=>makeGlowDot(.50,.50,'rgba(165,180,252,.9)'),7600);

  // Fade nodes, reveal glow
  after(()=>{
    rem('qtext','on');
    ['nGPT','nGEM','nPPX','nCLD'].forEach(id=>{rem(id,'in');add(id,'out')});
    setTimeout(()=>{$('svgl').innerHTML=''},900);
    add('cglow','on');
  },7800);

  // Logo assembly
  after(()=>add('lpre','on'),8700);
  after(()=>add('lmark','on'),9200);
  after(()=>add('lbadge','on'),10000);
  after(()=>add('lurl','on'),10600);

  // Replay
  after(()=>add('replay','on'),12500);

  // Progress bar
  const tick=()=>{
    const pct=Math.min(100,((Date.now()-t0)/TOTAL)*100);
    $('pfill').style.width=pct+'%';
    if(pct<100)requestAnimationFrame(tick);
  };
  requestAnimationFrame(tick);
}

function reset(){
  tos.forEach(t=>{clearTimeout(t);clearInterval(t)});tos=[];
  ['grid','scanline','qtext','cglow','lpre','lmark','lbadge','lurl','replay']
    .forEach(id=>['on','fire'].forEach(c=>rem(id,c)));
  ['nGPT','nGEM','nPPX','nCLD']
    .forEach(id=>['in','out','cited'].forEach(c=>rem(id,c)));
  ['csGPT','csGEM','csPPX','csCLD'].forEach(id=>rem(id,'on'));
  $('svgl').innerHTML='';
  $('pfill').style.width='0%';
  const sr=$('scan');sr.classList.remove('fire');void sr.offsetWidth;
}

$('replay').addEventListener('click',()=>{reset();setTimeout(play,130)});
play();
</script>
</body>
</html>
